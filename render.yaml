services:
  - type: web
    name: investment-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGIN
        sync: false        # set to your Vercel URL, e.g. https://my-app.vercel.app
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false        # min 32 chars; generate with: openssl rand -base64 48
      - key: REGISTRATION_ENABLED
        value: "true"      # set to "false" to disable public sign-up
      - key: SPRING_MAIL_HOST
        sync: false        # e.g. smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false        # e.g. your Gmail address
      - key: SPRING_MAIL_PASSWORD
        sync: false        # Gmail App Password
      - key: MAIL_FROM_ADDRESS
        sync: false        # sender address shown in emails
      - key: MAIL_FROM_NAME
        value: Alloca
      - key: FRONTEND_URL
        sync: false        # e.g. https://your-app.vercel.app
